name: pslrm-bump-action detects no changes

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  no_change:
    runs-on: ubuntu-latest

    steps:
      - name: Check out sandbox repository
        uses: actions/checkout@v6

      - name: Run pslrm-bump-action for no-change fixture
        id: bump
        uses: krymtkts/pslrm-bump-action@main
        with:
          project-path: projects/no-change-project
          github-token: ${{ github.token }}

      - name: Assert result is no_change
        shell: pwsh
        env:
          BUMP_BRANCH_NAME: ${{ steps.bump.outputs.bump_branch_name }}
          PULL_REQUEST_NUMBER: ${{ steps.bump.outputs.pull_request_number }}
          RESULT: ${{ steps.bump.outputs.result }}
        run: |
          if ($env:RESULT -ne 'no_change') {
            throw "Expected result=no_change, but got '$env:RESULT'."
          }

          if (-not [string]::IsNullOrWhiteSpace($env:BUMP_BRANCH_NAME)) {
            throw "Expected bump_branch_name to be empty, but got '$env:BUMP_BRANCH_NAME'."
          }

          if (-not [string]::IsNullOrWhiteSpace($env:PULL_REQUEST_NUMBER)) {
            throw "Expected pull_request_number to be empty, but got '$env:PULL_REQUEST_NUMBER'."
          }

          Write-Host 'No-change validation passed with result=no_change.'
